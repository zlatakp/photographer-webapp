services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: auralens
      POSTGRES_PASSWORD: auralens_secret
      POSTGRES_DB: auralens
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auralens"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - AUTH_SECRET=super-secret-locally-used-secret-key-12345
      - DATABASE_URL=postgresql://auralens:auralens_secret@db:5432/auralens
    command: npm run dev

volumes:
  postgres_data:
